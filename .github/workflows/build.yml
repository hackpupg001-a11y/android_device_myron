name: OrangeFox 14.1 — Xiaomi myron (SM8850)

on:
  workflow_dispatch:
    inputs:
      DEVICE_TREE_URL:
        description: "Device tree URL"
        required: true
        default: "https://github.com/hackpupg001-a11y/android_device_xiaomi_myron"
      DEVICE_TREE_BRANCH:
        description: "Device tree branch"
        required: true
        default: "fox_14.1"
      DEVICE_PATH:
        description: "Device path (device/xiaomi/myron)"
        required: true
        default: "xiaomi/myron"
      DEVICE_NAME:
        description: "Device codename"
        required: true
        default: "myron"
      BUILD_PARTITION:
        description: "Build partition: recovery (dedicated) or boot (VAB)"
        required: true
        default: "recovery"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Show build info
      run: |
        {
          echo 'BUILD_INFO<<EOF'
          echo
          echo "Device tree URL   : ${{ github.event.inputs.DEVICE_TREE_URL }}"
          echo "Device tree branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
          echo "Device path       : ${{ github.event.inputs.DEVICE_PATH }}"
          echo "Device name       : ${{ github.event.inputs.DEVICE_NAME }}"
          echo "Build target      : ${{ github.event.inputs.BUILD_PARTITION }}.img"
          echo "Build date        : $(date)"
          echo
          echo EOF
        } >> "$GITHUB_ENV"
        echo "BUILD_DATE=$(date +%F)" >> "$GITHUB_ENV"

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 4096
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        create-symlink: true
        max-size: 5G

    - name: Setup zram
      run: |
        sudo apt-get install -y linux-modules-extra-$(uname -r) zram-tools
        sudo modprobe zram
        sudo sed -i 's/^#PERCENT=50/PERCENT=90/' /etc/default/zramswap
        sudo sed -i 's/^#PRIORITY=100/PRIORITY=1000/' /etc/default/zramswap
        sudo systemctl restart zramswap
        zramctl

    - name: Setup build environment
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git git-lfs gnupg gperf \
          imagemagick lib32readline-dev lib32z1-dev libc6-dev-i386 \
          libelf-dev libgl1-mesa-dev lib32ncurses-dev libncurses-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush python3 python3-pip rsync schedtool \
          squashfs-tools xsltproc zip zlib1g-dev repo lz4
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    # ── Sync OrangeFox 14.1 source ─────────────────────────────────────────────
    - name: Sync OrangeFox 14.1 source
      run: |
        git clone https://gitlab.com/OrangeFox/sync.git -b master --depth=1
        WORKINGDIR=$(pwd)
        cd sync
        ./orangefox_sync.sh --branch 14.1 --path "$WORKINGDIR"
        cd "$WORKINGDIR"
        [ -d bootable/recovery ] || { echo "ERROR: bootable/recovery missing!"; exit 1; }
        [ -d vendor/twrp ]       || { echo "ERROR: vendor/twrp missing!"; exit 1; }
        echo "Sync OK"

    # ── Clone device tree ──────────────────────────────────────────────────────
    - name: Setup device tree
      run: |
        git clone "${{ github.event.inputs.DEVICE_TREE_URL }}" \
          -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
          --depth=1 \
          "device/${{ github.event.inputs.DEVICE_PATH }}"

    # ── Fix OFox 14.1 build bugs ───────────────────────────────────────────────
    - name: Fix OFox 14.1 build bugs
      run: |
        # FIX: bionic của OFox 14.1 có bug build → replace bằng bản đã fix
        rm -rf bionic
        git clone https://github.com/adontoo/OrangeFox-android_platform_bionic \
          --depth=1 bionic

    # ── Download Magisk 37 ─────────────────────────────────────────────────────
    - name: Download Magisk
      run: |
        mkdir -p /tmp/misc
        MAGISK_VERSION="v27.0"
        # Thử v27.0 trước, fallback về latest nếu fail
        wget -q --show-progress \
          -O /tmp/misc/Magisk.zip \
          "https://github.com/topjohnwu/Magisk/releases/download/${MAGISK_VERSION}/Magisk-${MAGISK_VERSION}.apk" \
        && echo "Magisk ${MAGISK_VERSION} downloaded OK" \
        || {
          echo "v27.0 not found, trying latest release..."
          LATEST=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          wget -q --show-progress \
            -O /tmp/misc/Magisk.zip \
            "https://github.com/topjohnwu/Magisk/releases/download/${LATEST}/Magisk-${LATEST}.apk" \
          && echo "Magisk ${LATEST} downloaded OK" \
          || echo "Magisk download FAILED (non-fatal)"
        }
        ls -lh /tmp/misc/Magisk.zip 2>/dev/null || echo "No Magisk zip"

    # ── Generate build info ────────────────────────────────────────────────────
    - name: Generate build info
      working-directory: device/${{ github.event.inputs.DEVICE_PATH }}
      run: |
        {
          echo -e "$BUILD_INFO"
          echo "Changelog:"
          set +e
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
          if [ $? -eq 0 ]; then
            git log "$LAST_TAG"..HEAD --pretty=format:"- %h %an: %s"
          else
            git log --oneline -10 --pretty=format:"- %h %an: %s"
          fi
        } > INFO.txt
        cat INFO.txt

    # ── Build OrangeFox ────────────────────────────────────────────────────────
    # FIX 1: unset PRODUCT_SOURCE_ROOT_DIRS *trước* envsetup.sh để Soong
    # FIX 2: OFox 14.1 bắt buộc format 3 phần <product>-<release>-<variant>
    #         AndroidProducts.mk đã được sửa → dùng trunk_staging
    - name: Build OrangeFox
      run: |
        # FIX: phải unset trước khi source envsetup để Soong scan đủ namespace
        unset PRODUCT_SOURCE_ROOT_DIRS
        export PRODUCT_SOURCE_ROOT_DIRS=""

        source build/envsetup.sh

        export ALLOW_MISSING_DEPENDENCIES=true
        export BUILD_BROKEN_DUP_RULES=true
        export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
        export FOX_BUILD_DEVICE="${{ github.event.inputs.DEVICE_NAME }}"
        export CCACHE_DIR="$(pwd)/.ccache"
        export CCACHE_EXEC=$(command -v ccache)
        export CCACHE_MAXSIZE=5G
        export USE_CCACHE=1
        export LC_ALL=C

        # Magisk path
        export OF_MAGISK="/tmp/misc/Magisk.zip"
        export FOX_USE_SPECIFIC_MAGISK_ZIP="/tmp/misc/Magisk.zip"

        # Dùng ap2a theo workflow tham khảo của adontoo (đã verified build OK)
        # Fallback ap3a → trunk_staging nếu ap2a không có
        DEVICE="${{ github.event.inputs.DEVICE_NAME }}"
        LUNCH_OK=0

        for RELEASE in "ap2a" "ap3a" "trunk_staging" "trunk"; do
          COMBO="twrp_${DEVICE}-${RELEASE}-eng"
          echo "Trying lunch combo: $COMBO"
          lunch "$COMBO" 2>/dev/null && { LUNCH_OK=1; echo "lunch OK: $COMBO"; break; }
        done

        if [ "$LUNCH_OK" -eq 0 ]; then
          echo "ERROR: No valid lunch combo found! Dumping available combos:"
          lunch 2>&1 | grep "twrp_" | head -20 || true
          exit 1
        fi

        # Progress monitor
        (while true; do
          echo "$(date +%T) | Building... | RAM: $(free -h | awk '/^Mem/{print $3"/"$2}')"
          sleep 60
        done) &
        MONITOR_PID=$!

        mka adbd "${{ github.event.inputs.BUILD_PARTITION }}image" 2>&1 | tee /tmp/build.log
        BUILD_STATUS=${PIPESTATUS[0]}

        kill "$MONITOR_PID" 2>/dev/null || true

        if [ "$BUILD_STATUS" -ne 0 ]; then
          echo ""
          echo "══════════════════════════════════════"
          echo "  BUILD FAILED — last 150 lines"
          echo "══════════════════════════════════════"
          tail -150 /tmp/build.log
          exit 1
        fi

        # Rename output
        OUT_DIR="out/target/product/${DEVICE}"
        IMG_NAME="OrangeFox-14.1-${DEVICE}-${{ env.BUILD_DATE }}.img"
        mv "${OUT_DIR}/${{ github.event.inputs.BUILD_PARTITION }}.img" "${OUT_DIR}/${IMG_NAME}"
        echo "Build success!"
        ls -lh "${OUT_DIR}/${IMG_NAME}"

    # ── Upload build log (always) ──────────────────────────────────────────────
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.run_id }}
        path: /tmp/build.log
        retention-days: 7

    # ── Release ────────────────────────────────────────────────────────────────
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox-14.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}.img
          out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: "OrangeFox-14.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}-#${{ github.run_number }}"
        tag_name: "${{ env.BUILD_DATE }}-${{ github.run_id }}"
        body_path: device/${{ github.event.inputs.DEVICE_PATH }}/INFO.txt
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
